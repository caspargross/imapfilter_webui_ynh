packaging_format = 2

id = "imapfilter_webui"
name = "imapfilter Web UI"
description.en = "Web-based configuration and control frontend for imapfilter"

version = "1.0~ynh1"

maintainers = []

[upstream]
license = "MIT"
website = "https://github.com/sebastianludwig/imapfilter-web-ui"
code = "https://github.com/sebastianludwig/imapfilter-web-ui"

[integration]
yunohost = ">= 11.2"
architectures = "all"
multi_instance = false
ldap = false
sso = false
disk = "100M"
ram.build = "200M"
ram.runtime = "50M"

[install]

  [install.domain]
  type = "domain"

  [install.path]
  type = "path"
  default = "/imapfilter"

  [install.init_main_permission]
  help.en = "Who can access the web UI (recommended: admins only)"
  type = "group"
  default = "admins"

[resources]

  [resources.system_user]

  [resources.install_dir]
  # Defaults to /var/www/imapfilter_webui

  [resources.ports]
  main.default = 4567

  [resources.permissions]
  main.url = "/"
  main.auth_header = false

  [resources.apt]
  packages = ["imapfilter", "ruby", "ruby-dev", "bundler", "git", "build-essential"]
