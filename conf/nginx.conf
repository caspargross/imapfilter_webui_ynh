rewrite ^__PATH__$ __PATH__/ permanent;

# SSE log stream — must have buffering disabled or events never reach the browser
location __PATH__/log {
    proxy_pass         http://127.0.0.1:__PORT__/log;
    proxy_http_version 1.1;

    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    proxy_buffering    off;
    proxy_cache        off;
    proxy_read_timeout 3600s;

    add_header         X-Accel-Buffering no;
}

location __PATH__/ {
    proxy_pass         http://127.0.0.1:__PORT__/;
    proxy_http_version 1.1;

    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # Rewrite absolute asset paths in HTML so the browser fetches
    # /imapfilter/css/... and /imapfilter/js/... (handled by this block)
    sub_filter_once off;
    sub_filter 'href="/css/'  'href="__PATH__/css/';
    sub_filter 'src="/js/'    'src="__PATH__/js/';
    sub_filter 'href="/"'     'href="__PATH__/';

    # Fix Location headers from Sinatra redirects (e.g. redirect "/login")
    proxy_redirect     / __PATH__/;

    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Include YunoHost user panel overlay
    include conf.d/yunohost_panel.conf.inc;
}
